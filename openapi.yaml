openapi: 3.0.3
info:
  title: Blog API
  version: 1.0.0

paths:
  /posts:
    get:
      summary: Alle Posts abrufen
      tags: [Posts]
      responses:
        '200':
          description: Liste aller Posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'

    post:
      summary: Post erstellen (Admin)
      tags: [Posts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '201':
          description: Post erstellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '401':
          description: Unauthorized

  /posts/{slug}:
    get:
      summary: Einzelnen Post abrufen
      tags: [Posts]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post nicht gefunden

  /auth/login:
    post:
      summary: Admin Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: JWT Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Falsche Credentials

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Post:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        content:
          type: string
          description: Markdown content
        created_at:
          type: string
          format: date-time

    PostInput:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
        content:
          type: string

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    TokenResponse:
      type: object
      properties:
        token:
          type: string
